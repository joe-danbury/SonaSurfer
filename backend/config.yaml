app:
  name: "SonaSurfer"
  debug: false
  cors_origins:
    - "http://localhost:3000"

agent:
  target_songs: 30
  max_search_attempts: 50
  timeout_seconds: 300

spotify:
  scopes:
    - "playlist-modify-public"
    - "playlist-modify-private"
    - "user-library-read"
    - "user-top-read"

claude:
  model: "claude-3-5-haiku-20241022"
  max_tokens: 4096

